<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Epic Fury | Intelligence Feed Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .feed-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .feed-card:hover {
            transform: translateY(-4px);
            border-color: #38bdf8;
            box-shadow: 0 10px 25px -5px rgba(56, 189, 248, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 10px;
        }

        .status-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Header Section -->
    <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <span class="inline-block w-3 h-3 bg-sky-500 rounded-full status-pulse"></span>
                <span class="text-sky-400 font-bold tracking-widest text-xs uppercase mono">Terminal Active</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">Operation <span class="text-sky-500 text-shadow-glow">Epic Fury</span></h1>
            <p class="text-slate-400 mt-2 max-w-xl">Centralized intelligence monitoring system. Aggregate, track, and manage real-time data streams across global operations.</p>
        </div>
        <div class="flex gap-3">
            <button onclick="openModal('add')" class="px-6 py-3 bg-sky-600 hover:bg-sky-500 transition-colors rounded-lg font-semibold flex items-center gap-2 shadow-lg shadow-sky-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                Deploy New Feed
            </button>
        </div>
    </header>

    <!-- Main Grid -->
    <main id="feed-container" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Feed Frames will be injected here -->
    </main>

    <!-- Modal for Adding/Editing -->
    <div id="feed-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/80 backdrop-blur-sm p-4">
        <div class="glass-panel w-full max-w-md rounded-2xl p-8 shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-bold mb-6">Configure Data Stream</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1 ml-1">Stream Label</label>
                    <input type="text" id="feed-title-input" placeholder="e.g., Tactical Logistics" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-sky-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1 ml-1">Feed Source (RSS URL)</label>
                    <input type="url" id="feed-url-input" placeholder="https://rss-source.com/feed" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-sky-500 transition-colors">
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="closeModal()" class="flex-1 px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg font-medium transition-colors">Cancel</button>
                    <button id="save-btn" class="flex-2 px-8 py-3 bg-sky-600 hover:bg-sky-500 rounded-lg font-bold transition-colors">Apply Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initial Mock/Example Data for "Operation Epic Fury"
        // Note: Real RSS feeds are often blocked by CORS. 
        // We use a public RSS-to-JSON proxy for demonstration, but for this app's logic
        // we'll maintain a robust architecture for URL management.
        const DEFAULT_FEEDS = [
            { id: 1, title: 'Global News Operations', url: 'https://www.theguardian.com/world/rss' },
            { id: 2, title: 'Tactical Technology', url: 'https://www.wired.com/feed/rss' },
            { id: 3, title: 'Strategic Logistics', url: 'http://feeds.feedburner.com/LogisticsManagement' },
            { id: 4, title: 'Geopolitical Analysis', url: 'https://foreignpolicy.com/feed/' },
            { id: 5, title: 'Intelligence Briefings', url: 'https://www.aljazeera.com/xml/rss/all.xml' },
            { id: 6, title: 'Defense Infrastructure', url: 'https://www.defensenews.com/arc/outboundfeeds/rss/' },
            { id: 7, title: 'Maritime Security', url: 'https://gcaptain.com/feed/' },
            { id: 8, title: 'Cyber Operations', url: 'https://thehackernews.com/feeds/posts/default' },
            { id: 9, title: 'Aerospace Updates', url: 'https://www.space.com/feeds/all' },
            { id: 10, title: 'Regional Stability', url: 'https://rss.nytimes.com/services/xml/rss/nyt/World.xml' }
        ];

        let feeds = JSON.parse(localStorage.getItem('epic_fury_feeds')) || DEFAULT_FEEDS;
        let currentEditingId = null;

        const container = document.getElementById('feed-container');
        const modal = document.getElementById('feed-modal');
        const titleInput = document.getElementById('feed-title-input');
        const urlInput = document.getElementById('feed-url-input');
        const saveBtn = document.getElementById('save-btn');

        // Initialize App
        function init() {
            renderFeeds();
        }

        function renderFeeds() {
            container.innerHTML = '';
            feeds.forEach(feed => {
                const card = createFeedCard(feed);
                container.appendChild(card);
                fetchFeedData(feed);
            });
            saveToStorage();
        }

        function createFeedCard(feed) {
            const div = document.createElement('div');
            div.className = 'feed-card glass-panel rounded-xl overflow-hidden flex flex-col h-[450px]';
            div.id = `feed-${feed.id}`;
            div.innerHTML = `
                <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/30">
                    <div>
                        <h3 class="font-bold text-sky-400 truncate max-w-[180px]">${feed.title}</h3>
                        <p class="text-[10px] text-slate-500 mono truncate max-w-[180px]">${feed.url}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="openModal('edit', ${feed.id})" class="p-2 hover:text-sky-400 transition-colors" title="Edit Source">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                        </button>
                        <button onclick="removeFeed(${feed.id})" class="p-2 hover:text-red-400 transition-colors" title="Decommission">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="feed-content flex-1 overflow-y-auto p-4 custom-scrollbar space-y-4" id="content-${feed.id}">
                    <div class="animate-pulse space-y-3">
                        <div class="h-4 bg-slate-700 rounded w-3/4"></div>
                        <div class="h-3 bg-slate-700 rounded w-full"></div>
                        <div class="h-3 bg-slate-700 rounded w-5/6"></div>
                    </div>
                </div>
            `;
            return div;
        }

        async function fetchFeedData(feed) {
            const contentArea = document.getElementById(`content-${feed.id}`);
            try {
                // Using rss2json API as a proxy to handle CORS and format the XML to JSON
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                const data = await response.json();

                if (data.status === 'ok') {
                    const items = data.items.slice(0, 5);
                    contentArea.innerHTML = items.map(item => `
                        <div class="group cursor-pointer">
                            <a href="${item.link}" target="_blank" class="block">
                                <h4 class="text-sm font-semibold text-slate-200 group-hover:text-sky-400 transition-colors leading-snug mb-1">
                                    ${item.title}
                                </h4>
                                <div class="flex items-center gap-2 text-[10px] text-slate-500 mono">
                                    <span>${new Date(item.pubDate).toLocaleDateString()}</span>
                                    <span class="w-1 h-1 bg-slate-600 rounded-full"></span>
                                    <span class="truncate">${item.author || 'Intelligence Bureau'}</span>
                                </div>
                            </a>
                        </div>
                        <hr class="border-slate-800 last:hidden">
                    `).join('');
                } else {
                    throw new Error('Incompatible format');
                }
            } catch (err) {
                contentArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center text-slate-500 opacity-60">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        <p class="text-xs uppercase font-bold tracking-widest">Signal Lost</p>
                        <p class="text-[10px] mt-1">Unable to decode stream. Verify URL.</p>
                    </div>
                `;
            }
        }

        // Modal Logic
        function openModal(mode, id = null) {
            currentEditingId = id;
            if (mode === 'add') {
                document.getElementById('modal-title').innerText = 'Deploy New Data Stream';
                titleInput.value = '';
                urlInput.value = '';
                saveBtn.onclick = addFeed;
            } else {
                const feed = feeds.find(f => f.id === id);
                document.getElementById('modal-title').innerText = 'Edit Stream Configuration';
                titleInput.value = feed.title;
                urlInput.value = feed.url;
                saveBtn.onclick = updateFeed;
            }
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        function addFeed() {
            if (!titleInput.value || !urlInput.value) return;
            const newFeed = {
                id: Date.now(),
                title: titleInput.value,
                url: urlInput.value
            };
            feeds.push(newFeed);
            renderFeeds();
            closeModal();
        }

        function updateFeed() {
            const index = feeds.findIndex(f => f.id === currentEditingId);
            if (index !== -1) {
                feeds[index].title = titleInput.value;
                feeds[index].url = urlInput.value;
                renderFeeds();
                closeModal();
            }
        }

        function removeFeed(id) {
            if (confirm('Are you sure you want to decommission this data stream?')) {
                feeds = feeds.filter(f => f.id !== id);
                renderFeeds();
            }
        }

        function saveToStorage() {
            localStorage.setItem('epic_fury_feeds', JSON.stringify(feeds));
        }

        // Listen for Esc key to close modal
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        init();
    </script>
</body>
</html>
